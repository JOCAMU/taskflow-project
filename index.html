
<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<header class="bg-blue-600 text-white p-4 flex justify-between items-center">
<h1 class="text-2xl font-bold">Taskflow</h1>

<button id="toggle-dark"
class="bg-white text-blue-600 px-3 py-1 rounded hover:bg-gray-200 transition">
Modo oscuro </button>

</header>

<div class="flex gap-6 p-6 max-w-6xl">

<aside class="bg-white dark:bg-gray-800 p-5 rounded-lg shadow w-64 flex flex-col gap-4">

<h2 class="text-lg font-semibold text-gray-800 dark:text-white">
Nueva tarea
</h2>

<form id="task-form" class="flex flex-col gap-3">

<input
type="text"
id="task-input"
placeholder="Nueva tarea..."
class="border p-2 rounded w-full"
/>

<select
id="priority-input"
class="border p-2 rounded w-full"

>

<option value="alta">Alta</option>
<option value="media">Media</option>
<option value="baja">Baja</option>
</select>

<button
type="submit"
class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">
Añadir </button>

</form>

</aside>

<main class="flex-1 flex flex-col gap-6">

<section>

<h2 class="text-xl font-semibold mb-3 text-gray-800 dark:text-white">
Mis tareas
</h2>

<div id="task-list" class="flex flex-col gap-3">
</div>

</section>

<section>

<h2 class="text-xl font-semibold mb-3 text-gray-800 dark:text-white">
Buscar tareas
</h2>

<input
type="text"
id="search-input"
placeholder="Buscar tarea..."
class="border p-2 rounded w-full"
/>

</section>

</main>

</div>

<script src="app.js"></script>

</body>
</html>
