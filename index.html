
<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class'
  }
</script>

</head>


<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex flex-col">
<header class="bg-blue-600 text-white p-4 flex justify-between items-center">
<h1 class="text-2xl font-bold">Taskflow</h1>

<button id="toggle-dark"
class="bg-white text-blue-600 px-3 py-1 rounded hover:bg-gray-200 transition focus:ring-2 focus:ring-blue-300">
Modo oscuro </button>

</header>


<div class= "flex flex-col md:flex-row gap-6 p-6 max-w-6xl w-full dark:bg-gray-900">

<aside class="bg-gray-700 dark:bg-gray-800 p-5 rounded-lg shadow w-full md:w-64 flex flex-col gap-4">
 <h2 class="text-lg font-semibold text-gray-800 dark:text-white">
Nueva tarea
</h2>

<form id="task-form" class="flex flex-col gap-3">

<input
type="text"
id="task-input"
placeholder="Nueva tarea..."
class="border p-2 rounded w-full text-base focus:outline-none focus:ring-2 focus:ring-blue-500"
maxlength="50"
>

<label for="priority-input" class="text-white">Prioridad</label>
<select
id="priority-input"
class="border p-2 rounded w-full"

>



<option value="alta">Alta</option>
<option value="media">Media</option>
<option value="baja">Baja</option>
</select>

<button
type="submit"
class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition focus:ring-2 focus:ring-blue-300">
Añadir </button>

</form>

<h2 class="text-lg font-semibold text-white">Estadisticas</h2>
<p class="text-white">total: <span id="total-tasks">0</span></p>
<p class="text-white">Completadas: <span id="completed-tasks">0</span></p>
<p class="text-white">pendiente: <span id="pending-task">0</span></p>

<button id="clear-completed" class="bg-red-500 text-white p-2 rounded hover:bg-red-600 transition focus:ring-2 focus:ring-blue-300">
  Borrar completadas
</button>
</aside>

<main class="flex-1 flex flex-col gap-6">

<section>

<h2 class="text-xl font-semibold mb-3 text-gray-800 dark:text-white">
   mis tareas
 </h2>


   
<div id="task-list" class="flex flex-col gap-3">
</div>


</section>

<section>

<h2 class="text-xl font-semibold mb-3 text-gray-800 dark:text-white">
Buscar tareas
</h2>
<label for="task-input">Nombre de la tarea</label>
<input
type="text"
id="search-input"
placeholder="Buscar tarea..."
class="border p-2 rounded w-full text-base focus:outline-none focus:ring-2 focus:ring-blue-500"
>
<button id="complete-all" class="bg-orange-500 text-white px-3 py-1 rounded hover:bg-orange-600 transition mt-3">Completar todas</button>
</section>

</main>

</div>

<!-- script src="app.js"></script-->

<h2 class= "text-xl font-semibold mb-3 text-gray-800 dark:text-white text-center"> filtras tareas</h2>  
<div class="flex gap-2 mb-3 justify-center">
  <button id="filter-all" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700 transition">Todas</button>
  <button id="filter-pending" class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600 transition">Pendientes</button>
  <button id="filter-completed" class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600 transition">Completadas</button>
  
</div>
<script src="app.js"></script>
<footer class="bg-blue-600 text-white text-center p-3 mt-auto">
<p>TaskFlow - Gestor de tareas</p>
</footer>

</body>
</html>
