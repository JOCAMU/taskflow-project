<!DOCTYPE html>

    <title>Taskflow</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

  </header>

                 <option value="media">media</option>

        </form>
    </aside>
   
  
   <main>
        <section>
            <h2>Mis tareas</h2>
       
            <div id="task-list">
              </div>
           
         </section>

    </main>
    
</div>
 <script src="app.js"></script>
</body>
</html>
